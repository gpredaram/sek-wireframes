<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>SEK · Subir wireframe</title>
  <link rel="stylesheet" href="shared/upload.css">
</head>
<body>
<div class="u-shell">

  <header class="u-head">
    <span class="u-badge">SEK · Wireframes</span>
    <h1>Subir un archivo</h1>
    <p>Escribe la contraseña, elige la carpeta del explorador y arrastra tu archivo. Se publica solo.</p>
  </header>

  <!-- Password gate -->
  <div class="u-gate">
    <div class="u-field">
      <label for="pwd">Contraseña</label>
      <input class="u-input" type="password" id="pwd" autocomplete="current-password" placeholder="Contraseña de subida">
    </div>
    <button class="u-btn" id="connect" style="width:auto;margin-top:0">Conectar</button>
  </div>

  <!-- Two panels: folder browser + upload -->
  <div class="u-grid" id="workspace" hidden>

    <section class="u-panel">
      <div class="u-panel-head">
        Explorador
        <span class="u-hint">elige destino</span>
      </div>
      <div class="u-panel-body">
        <div class="u-tree" id="tree"><div class="u-empty">Cargando…</div></div>
      </div>
    </section>

    <section class="u-panel">
      <div class="u-panel-head">Subir archivo</div>
      <div class="u-panel-body">
        <div class="u-dest">Destino: <code id="dest">/ (raíz)</code></div>

        <div class="u-drop" id="drop">
          <p>Arrastra uno o varios archivos aquí<br>o <strong>haz clic para elegirlos</strong></p>
          <input type="file" id="file" hidden multiple accept=".html,.css,.js,.svg,.png,.jpg,.jpeg,.webp,.gif,.ico,.woff,.woff2,.json,.txt,.md">
        </div>
        <ul class="u-files" id="files"></ul>

        <button class="u-btn" id="send" disabled>Subir y publicar</button>
        <div class="u-status" id="status"></div>
      </div>
    </section>

  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const ICON_FOLDER = '<svg class="u-ic" viewBox="0 0 16 16" fill="none"><path d="M1.5 4.5A1.5 1.5 0 0 1 3 3h3l1.5 1.5H13A1.5 1.5 0 0 1 14.5 6v6A1.5 1.5 0 0 1 13 13.5H3A1.5 1.5 0 0 1 1.5 12V4.5Z" fill="#ffb259" stroke="#e57600" stroke-width="1"/></svg>';
  const ICON_FILE = '<svg class="u-ic" viewBox="0 0 16 16" fill="none"><path d="M4 1.5h5L13 5.5V14a.5.5 0 0 1-.5.5h-9A.5.5 0 0 1 3 14V2a.5.5 0 0 1 .5-.5Z" fill="#fff" stroke="#9aa3af" stroke-width="1"/><path d="M9 1.5V5.5h4" stroke="#9aa3af" stroke-width="1" fill="none"/></svg>';

  let password = '';
  let destination = '';            // '' = root
  let chosen = null;
  const host = location.origin;

  function setStatus(msg, kind) { $('status').textContent = msg; $('status').className = 'u-status' + (kind ? ' ' + kind : ''); }

  // ---- build nested tree from flat paths ----
  function buildTree(items) {
    const root = { dirs: {}, files: [] };
    items.forEach(({ path, type }) => {
      const parts = path.split('/');
      let node = root;
      parts.forEach((p, i) => {
        const last = i === parts.length - 1;
        if (last && type === 'blob') { node.files.push({ name: p, path }); }
        else { node.dirs[p] = node.dirs[p] || { dirs: {}, files: [], path: parts.slice(0, i + 1).join('/') }; node = node.dirs[p]; }
      });
    });
    return root;
  }

  function renderNode(node, depth) {
    const wrap = document.createElement('div');
    const dirNames = Object.keys(node.dirs).sort();
    dirNames.forEach((name) => {
      const d = node.dirs[name];
      const row = document.createElement('div');
      row.className = 'u-row';
      row.style.paddingLeft = (8 + depth * 16) + 'px';
      row.dataset.path = d.path + '/';
      row.innerHTML = '<span class="u-tw">▾</span>' + ICON_FOLDER + '<span class="u-nm">' + name + '</span>';
      const children = renderNode(d, depth + 1);
      const twisty = row.querySelector('.u-tw');
      row.addEventListener('click', (e) => {
        if (e.target === twisty) { // toggle
          const open = children.style.display !== 'none';
          children.style.display = open ? 'none' : '';
          twisty.textContent = open ? '▸' : '▾';
          return;
        }
        selectDir(row, d.path + '/');
      });
      wrap.appendChild(row);
      wrap.appendChild(children);
    });
    node.files.sort((a, b) => a.name.localeCompare(b.name)).forEach((f) => {
      const row = document.createElement('div');
      row.className = 'u-row is-file';
      row.style.paddingLeft = (8 + depth * 16 + 14) + 'px';
      const href = host + '/' + f.path.replace(/\.html$/, '');
      row.innerHTML = ICON_FILE + '<span class="u-nm"><a href="' + href + '" target="_blank" rel="noopener">' + f.name + '</a></span>';
      wrap.appendChild(row);
    });
    return wrap;
  }

  function selectDir(row, path) {
    document.querySelectorAll('.u-row.sel').forEach((r) => r.classList.remove('sel'));
    row.classList.add('sel');
    destination = path;
    $('dest').textContent = '/' + path;
  }

  // ---- connect (load tree) ----
  $('connect').addEventListener('click', async () => {
    password = $('pwd').value;
    if (!password) { setStatusGate('Escribe la contraseña.'); return; }
    $('connect').disabled = true; $('connect').textContent = 'Conectando…';
    try {
      const res = await fetch('/api/tree', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password }) });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || ('Error ' + res.status));
      const tree = buildTree(data.tree || []);
      const container = $('tree'); container.innerHTML = '';
      // root selectable row
      const rootRow = document.createElement('div');
      rootRow.className = 'u-row sel'; rootRow.dataset.path = '';
      rootRow.innerHTML = ICON_FOLDER + '<span class="u-nm">/ (raíz)</span>';
      rootRow.addEventListener('click', () => selectDir(rootRow, ''));
      container.appendChild(rootRow);
      container.appendChild(renderNode(tree, 1));
      $('workspace').hidden = false;
      $('connect').textContent = 'Conectado ✓';
    } catch (err) {
      $('connect').disabled = false; $('connect').textContent = 'Conectar';
      setStatusGate('✗ ' + err.message);
    }
  });
  function setStatusGate(msg) {
    let el = document.querySelector('.u-gate .u-gate-msg');
    if (!el) { el = document.createElement('div'); el.className = 'u-status err u-gate-msg'; el.style.flex = '1 0 100%'; $('connect').parentElement.appendChild(el); }
    el.textContent = msg;
  }

  // ---- multi-file queue + batch upload ----
  let queued = [];

  function renderQueue() {
    const ul = $('files');
    ul.innerHTML = '';
    queued.forEach((f, i) => {
      const li = document.createElement('li');
      const label = document.createElement('span');
      label.textContent = f.name + ' · ' + Math.ceil(f.size / 1024) + ' KB';
      const rm = document.createElement('button');
      rm.type = 'button'; rm.className = 'u-rm'; rm.textContent = '✕'; rm.title = 'Quitar';
      rm.addEventListener('click', () => { queued.splice(i, 1); renderQueue(); });
      li.appendChild(label); li.appendChild(rm);
      ul.appendChild(li);
    });
    $('send').disabled = queued.length === 0;
    $('send').textContent = queued.length > 1 ? ('Subir y publicar (' + queued.length + ')') : 'Subir y publicar';
  }

  function addFiles(list) {
    Array.from(list || []).forEach((f) => {
      if (!queued.some((q) => q.name === f.name && q.size === f.size)) queued.push(f);
    });
    setStatus('');
    renderQueue();
  }

  $('drop').addEventListener('click', () => $('file').click());
  $('file').addEventListener('change', () => { addFiles($('file').files); $('file').value = ''; });
  ['dragenter', 'dragover'].forEach((e) => $('drop').addEventListener(e, (ev) => { ev.preventDefault(); $('drop').classList.add('is-over'); }));
  ['dragleave', 'drop'].forEach((e) => $('drop').addEventListener(e, (ev) => { ev.preventDefault(); $('drop').classList.remove('is-over'); }));
  $('drop').addEventListener('drop', (ev) => addFiles(ev.dataTransfer.files));

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(String(r.result).split(',')[1]);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  $('send').addEventListener('click', async () => {
    if (!queued.length) return;
    $('send').disabled = true;
    setStatus('Subiendo ' + queued.length + ' archivo(s)…');
    try {
      const files = [];
      for (const f of queued) {
        files.push({ path: destination + f.name, contentBase64: await toBase64(f) });
      }
      const res = await fetch('/api/upload-batch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password, files })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || ('Error ' + res.status));
      setStatus('✓ ' + data.count + ' archivo(s) subido(s) a /' + destination + ' · publicándose (~1 min).', 'ok');
      queued = []; renderQueue();
    } catch (err) {
      setStatus('✗ ' + err.message, 'err');
      $('send').disabled = false;
    }
  });
</script>
</body>
</html>
