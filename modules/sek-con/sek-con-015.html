<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEK-CON-015 | Bloque infografía</title>
<style>
  :root {
    --white:    #ffffff;
    --gray-100: #f0f0f0;
    --gray-200: #e0e0e0;
    --gray-300: #cccccc;
    --gray-400: #aaaaaa;
    --gray-500: #888888;
    --gray-600: #666666;
    --gray-700: #444444;
    --gray-800: #222222;
    --radius:   4px;
    --font:     'Helvetica Neue', Arial, sans-serif;
    --mono:     'Courier New', monospace;
    --pad-x-mobile:  20px;
    --pad-x-tablet:  32px;
    --pad-x-desktop: 56px;
    --pad-y-mobile:  32px;
    --pad-y-tablet:  40px;
    --pad-y-desktop: 56px;
    --max-w: 1200px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--white); color: var(--gray-800); font-size: 15px; line-height: 1.5; padding-top: 40px; -webkit-font-smoothing: antialiased; }

  /* TOOLBAR */
  .wf-toolbar { position: fixed; top: 0; left: 0; right: 0; height: 40px; background: var(--gray-800); color: var(--gray-400); display: flex; align-items: center; padding: 0 20px; gap: 16px; z-index: 9998; font-family: var(--mono); font-size: 11px; }

  /* CONTENEDOR */
  .container { width: 100%; max-width: var(--max-w); margin: 0 auto; padding: 0 var(--pad-x-mobile); }

  /* SECCIÓN */
  .sec { padding: var(--pad-y-mobile) 0; }

  /* TIPOGRAFÍA */
  h2 { font-size: 22px; font-weight: 700; color: var(--gray-800); margin-bottom: 20px; line-height: 1.2; }

  /* IMAGEN INFOGRAFÍA */
  .img-ph--infografia {
    background: var(--gray-200);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--gray-400);
    width: 90%;
    aspect-ratio: 1 / 1;
    margin: 0 auto;
  }

  /* TABLET */
  @media (min-width: 768px) {
    .container { padding: 0 var(--pad-x-tablet); }
    .sec { padding: var(--pad-y-tablet) 0; }
    h2 { font-size: 28px; }
    .img-ph--infografia { width: 70%; }
  }

  /* DESKTOP */
  @media (min-width: 1200px) {
    .container { padding: 0 var(--pad-x-desktop); }
    .sec { padding: var(--pad-y-desktop) 0; }
    h2 { font-size: 32px; }
    .img-ph--infografia { width: 55%; }
  }
</style>
</head>
<body>

<div class="wf-toolbar">
  <strong>SEK-CON-015</strong>
  <span>Bloque infografía · v1.0</span>
</div>

<section class="sec">
  <div class="container">
    <h2>Título de sección (opcional)</h2>
    <div class="img-ph--infografia">imagen · infografía</div>
  </div>
</section>

</body>
</html>
