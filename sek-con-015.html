<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEK-CON-015 | Bloque infografía</title>
<style>
  :root {
    --white:    #ffffff;
    --gray-50:  #fafafa;
    --gray-100: #f0f0f0;
    --gray-200: #e0e0e0;
    --gray-300: #cccccc;
    --gray-400: #aaaaaa;
    --gray-800: #222222;
    --radius:   4px;
    --font:     'Helvetica Neue', Arial, sans-serif;
    --mono:     'Courier New', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--gray-50); color: var(--gray-800); padding-top: 40px; }

  .wf-toolbar { position: fixed; top: 0; left: 0; right: 0; height: 40px; background: var(--gray-800); color: var(--gray-400); display: flex; align-items: center; padding: 0 20px; gap: 16px; z-index: 9998; font-family: var(--mono); font-size: 11px; }

  .vp-section { padding: 40px 20px; border-bottom: 1px dashed var(--gray-300); }
  .vp-label { font-family: var(--mono); font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .08em; text-align: center; margin-bottom: 16px; }
  .vp-label span.w { color: var(--gray-400); }
  .vp-frame-outer { display: flex; justify-content: center; overflow-x: auto; }
  .vp-frame { background: var(--white); border: 1px solid var(--gray-300); border-radius: 6px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); flex-shrink: 0; }

  .mod-content { padding: 32px 20px; }
  .mod-content h2 { font-size: 20px; font-weight: 700; color: var(--gray-800); margin-bottom: 20px; }
  .mod-img-ph { background: var(--gray-200); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 11px; color: var(--gray-400); width: 90%; aspect-ratio: 1/1; margin: 0 auto; }

  .vp-tablet .mod-content { padding: 40px 32px; }
  .vp-tablet .mod-content h2 { font-size: 26px; }
  .vp-tablet .mod-img-ph { width: 70%; }

  .vp-desktop .mod-content { padding: 48px 40px; }
  .vp-desktop .mod-content h2 { font-size: 30px; }
  .vp-desktop .mod-img-ph { width: 55%; }
</style>
</head>
<body>

<div class="wf-toolbar">
  <strong>SEK-CON-015</strong>
  <span>Bloque infografía · v1.0 · vistas responsive</span>
</div>

<!-- MOBILE 375px -->
<div class="vp-section">
  <div class="vp-label">Mobile <span class="w">· 375px</span></div>
  <div class="vp-frame-outer">
    <div class="vp-frame vp-mobile" style="width:375px;">
      <div class="mod-content">
        <h2>Título de sección (opcional)</h2>
        <div class="mod-img-ph">imagen · infografía</div>
      </div>
    </div>
  </div>
</div>

<!-- TABLET 768px -->
<div class="vp-section">
  <div class="vp-label">Tablet <span class="w">· 768px</span></div>
  <div class="vp-frame-outer">
    <div class="vp-frame vp-tablet" style="width:768px;">
      <div class="mod-content">
        <h2>Título de sección (opcional)</h2>
        <div class="mod-img-ph">imagen · infografía</div>
      </div>
    </div>
  </div>
</div>

<!-- DESKTOP 1200px -->
<div class="vp-section">
  <div class="vp-label">Desktop <span class="w">· 1200px</span></div>
  <div class="vp-frame-outer">
    <div class="vp-frame vp-desktop" style="width:1200px;">
      <div class="mod-content">
        <h2>Título de sección (opcional)</h2>
        <div class="mod-img-ph">imagen · infografía</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
